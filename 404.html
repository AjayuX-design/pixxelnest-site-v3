<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page not found · PixxelNest</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

<style>
:root {
  --bg: #F4EEE3; --ink: #1C1814; --ink-soft: #3A332C; --muted: #8A8074;
  --hairline: rgba(28,24,20,0.10); --accent: #E55A3C;
  --font-display: 'Geist','Inter',system-ui,sans-serif;
  --font-body: 'Inter',system-ui,sans-serif;
  --font-serif: 'Instrument Serif',Georgia,serif;
  --ease: cubic-bezier(0.22,1,0.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--ink);font-family:var(--font-body);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;
}
a{color:inherit;text-decoration:none}
.mark{display:flex;gap:6px;margin-bottom:40px}
.mark span{width:14px;height:14px;border-radius:3px}
.mark span:nth-child(1){background:var(--ink)}
.mark span:nth-child(2){background:var(--accent)}
.eyebrow{font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:20px}
h1{
  font-family:var(--font-display);font-size:clamp(48px,9vw,96px);
  line-height:0.95;letter-spacing:-0.04em;font-weight:500;margin-bottom:20px;
}
h1 .italic{font-family:var(--font-serif);font-style:italic;font-weight:400;color:var(--accent)}
p{font-size:17px;color:var(--ink-soft);max-width:44ch;margin-bottom:40px;line-height:1.55}
.actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{
  display:inline-flex;align-items:center;gap:10px;padding:15px 24px;border-radius:999px;
  font-size:14px;font-weight:500;transition:transform 0.3s var(--ease);
}
.btn:hover{transform:translateY(-2px)}
.btn-primary{background:var(--accent);color:#FFF7F0}
.btn-ghost{border:1px solid var(--hairline)}
</style>
</head>
<body>
  <div class="mark" aria-hidden="true"><span></span><span></span></div>
  <div class="eyebrow">404</div>
  <h1>That page <span class="italic">wandered off.</span></h1>
  <p>We couldn't find what you were looking for. It may have moved, or the link might be off. Here's how to get back on track.</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">Back to home</a>
    <a href="/work.html" class="btn btn-ghost">See our work</a>
    <a href="/book.html" class="btn btn-ghost">Book a call</a>
  </div>
</body>
</html>
